name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  project-gate:
    name: Project Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust Toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --component rustfmt --component clippy
          rustup default "$toolchain"
          rustc --version
          cargo --version

      - name: Cache Cargo State
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-deny --version 0.19.9 --locked

      - name: Run Project CI
        env:
          CLASH_TUI_REQUIRE_CARGO_DENY: "1"
        run: cargo xtask ci

      - name: Build CLI Smoke Binary
        run: cargo build -p clash-tui

      - name: Run CLI Smoke
        shell: bash
        run: |
          set -euo pipefail
          target/debug/clash-tui --help >/tmp/clash-tui-help.txt
          grep -q "clash-tui" /tmp/clash-tui-help.txt
