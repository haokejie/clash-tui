name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - devheadless
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --component rustfmt --component clippy
          rustup default "$toolchain"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: Validate
        env:
          CLASH_TUI_REQUIRE_CARGO_DENY: "1"
        run: cargo xtask ci
