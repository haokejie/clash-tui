[advisories]
ignore = [
  # RUSTSEC-2024-0415 is currently tolerated by the existing dependency graph.
  "RUSTSEC-2024-0415",
  # RUSTSEC-2024-0436 is currently tolerated through transitive dependencies.
  "RUSTSEC-2024-0436",
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0-only",
  "ISC",
  "LGPL-2.1-or-later",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.85

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
